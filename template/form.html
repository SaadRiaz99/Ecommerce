{% extends 'base.html' %}

{% block title %}Login / Signup - MyShop{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-tabs">
            <button id="login-tab" class="active">Login</button>
            <button id="signup-tab">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <form action="#" method="post" id="login-form" class="auth-form">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- SIGNUP FORM -->
        <form action="#" method="post" id="signup-form" class="auth-form" style="display:none;">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
        </form>

    </div>
</section>
<script>
    const loginTab = document.getElementById("login-tab");
    const SignupTab = document.getElementById("signup-tab");
    const loginForm = document.getElementById("signup-form");
    const signupForm = document.getElementById('signup-form');


    loginTab.addEventListener("click" , () => {
        loginTab.classList.add('active');
        SignupTab.classList.remove('active');
        loginForm.style.display("Block");
        signupForm.style.display("None");

    })
    SignupTab.addEventListener("click" , () => {
        loginTab.classList.remove('active');
        SignupTab.classList.add('active');
        loginForm.style.display("None");
        signupForm.style.display("Block");

    })
</script>


{% endblock %}
